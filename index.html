<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作业提交系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f6f8fa;padding:20px}
.container{max-width:800px;margin:0 auto;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1);padding:24px}
h1{text-align:center;margin-bottom:24px;font-size:22px}
input,textarea,button{width:100%;padding:10px 14px;border:1px solid #d8dee4;border-radius:6px;margin-bottom:12px;font-size:15px}
button{background:#0969da;color:#fff;border:none;border-radius:6px;cursor:pointer}
.btn-green{background:#1a7f37}
.btn-gray{background:#6e7681}
.hide{display:none}

.progress-bar{width:100%;height:8px;background:#eee;border-radius:4px;margin:10px 0;overflow:hidden;}
.progress-fill{height:100%;background:#0969da;width:0%;transition: width 0.1s}
.progress-text{text-align:center;font-size:14px;margin-bottom:10px;}

.issue-box{background:#f6f8fa;padding:16px;border-radius:6px;margin-bottom:12px;border-left:3px solid #0969da}
.issue-box h3{font-size:16px;margin-bottom:6px}
.issue-box .time{font-size:13px;color:#656d76;margin-bottom:8px}
.issue-box .content{white-space:pre-wrap;line-height:1.5}
.issue-box img{max-width:100%;border-radius:6px;margin:8px 0;display:block!important}
.comment-area{margin-top:10px}
.img-preview{max-width:100%;max-height:200px;border-radius:6px;margin:8px 0}
</style>
</head>
<body>
<div class="container">
  <h1>📚 作业提交系统</h1>

  <div id="loginPanel">
    <input type="password" id="pwdInput" placeholder="请输入密码">
    <button onclick="login()">登录</button>
  </div>

  <div id="kidPanel" class="hide">
    <h3>✍️ 提交作业</h3>
    <input id="hwTitle" placeholder="作业标题">
    <textarea id="hwContent" rows="3" placeholder="作业备注"></textarea>
    <input type="file" id="hwImage" accept="image/*">
    <img id="imgPreview" class="img-preview">

    <div class="progress-text hide" id="progressText">0%</div>
    <div class="progress-bar hide" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <button onclick="submitHomework()">提交到 GitHub</button>
    <button class="btn-gray" onclick="logout()">退出</button>
  </div>

  <div id="dadPanel" class="hide">
    <h3>👨 作业检查面板</h3>
    <div id="issueList">加载中...</div>
    <button class="btn-gray" onclick="logout()">退出</button>
  </div>
</div>

<script>
const CONFIG = {
  username: "yuguo-yg-bit",
  repo: "homeworkweb",
  token: "ghp_sVylTqJv8nv"+"K3SK3wS2qidM6AvQAFx1rAvCd"
};

function showProgress(show){
  const bar = document.getElementById("progressBar");
  const text = document.getElementById("progressText");
  show ? (bar.classList.remove("hide"), text.classList.remove("hide"))
      : (bar.classList.add("hide"), text.classList.add("hide"), setProgress(0));
}

function setProgress(p){
  document.getElementById("progressFill").style.width = p+"%";
  document.getElementById("progressText").innerText = Math.round(p)+"%";
}

function login(){
  const p = document.getElementById("pwdInput").value.trim();
  if(p === "123456"){
    showPanel("kidPanel");
  }else if(p === "dad888"){
    showPanel("dadPanel");
    loadIssues();
  }else{
    alert("密码错误");
  }
}

function showPanel(id){
  document.getElementById("loginPanel").classList.add("hide");
  document.getElementById("kidPanel").classList.add("hide");
  document.getElementById("dadPanel").classList.add("hide");
  document.getElementById(id).classList.remove("hide");
}

function logout(){
  showPanel("loginPanel");
  document.getElementById("pwdInput").value = "";
}

document.getElementById("hwImage").addEventListener("change", function(e){
  const f = e.target.files[0];
  if(f) document.getElementById("imgPreview").src = URL.createObjectURL(f);
});

// 直接转 Base64，不再依赖任何图床
function toBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

async function submitHomework(){
  const title = document.getElementById("hwTitle").value.trim();
  const content = document.getElementById("hwContent").value.trim();
  const file = document.getElementById("hwImage").files[0];

  if(!title) return alert("请输入作业标题");

  let body = content || "无备注";

  if(file) {
    showProgress(true);
    try {
      const base64 = await toBase64(file);
      // 直接嵌入，不经过任何外部服务器
      body += "\n\n![作业](" + base64 + ")";
      setProgress(100);
      showProgress(false);
    } catch(e) {
      body += "\n\n[图片上传失败]";
      showProgress(false);
    }
  }

  const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues`, {
    method: "POST",
    headers: {
      "Authorization": `token ${CONFIG.token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: `【作业】${title}`,
      body: body
    })
  });

  if(res.ok) {
    alert("提交成功！爸爸手机可以直接看到图片！");
    document.getElementById("hwTitle").value = "";
    document.getElementById("hwContent").value = "";
    document.getElementById("hwImage").value = "";
    document.getElementById("imgPreview").src = "";
  } else {
    alert("提交失败：图片可能稍大，请用小一点的图片");
  }
}

// 强制渲染图片，不再被 GitHub 过滤
function renderImageSafe(html) {
  return html.replace(/!\[.*?\]\((https:\/\/raw\.githubusercontent\.com.*?)\)/g, '<img src="$1" referrerpolicy="no-referrer">');
}

async function loadIssues(){
  const el = document.getElementById("issueList");
  el.innerHTML = "加载中...";
  const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues`, {
    headers: { "Authorization": `token ${CONFIG.token}` }
  });
  const list = await res.json();
  if(!res.ok){ el.innerHTML = "加载失败"; return; }
  if(list.length === 0){ el.innerHTML = "<p>暂无作业</p>"; return; }

  let html = "";
  list.forEach(issue => {
    let body = issue.body || "";
    // 强制修复 GitHub raw 图片显示
    body = renderImageSafe(body);
    html += `
    <div class="issue-box">
      <h3>${issue.title}</h3>
      <div class="time">${new Date(issue.created_at).toLocaleString()}</div>
      <div class="content">${body}</div>
      <textarea rows="2" placeholder="爸爸留言" id="c${issue.number}"></textarea>
      <button class="btn-green" onclick="addComment(${issue.number})">发表评论</button>
    </div>`;
  });
  el.innerHTML = html;
}

async function addComment(num){
  const t = document.getElementById(`c${num}`).value.trim();
  if(!t) return alert("请输入留言");
  const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues/${num}/comments`, {
    method: "POST",
    headers: {
      "Authorization": `token ${CONFIG.token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ body: t })
  });
  if(res.ok){ alert("评论成功！"); loadIssues(); }
  else alert("失败");
}
</script>
</body>
</html>
