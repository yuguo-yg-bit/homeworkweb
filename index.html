<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作业提交系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f6f8fa;padding:20px}
.container{max-width:800px;margin:0 auto;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1);padding:24px}
h1{text-align:center;margin-bottom:24px;font-size:22px}
input,textarea,button{width:100%;padding:10px 14px;border:1px solid #d8dee4;border-radius:6px;margin-bottom:12px;font-size:15px}
button{background:#0969da;color:#fff;border:none;border-radius:6px;cursor:pointer}
.btn-green{background:#1a7f37}
.btn-gray{background:#6e7681}
.hide{display:none}
.issue-box{background:#f6f8fa;padding:16px;border-radius:6px;margin-bottom:12px;border-left:3px solid #0969da}
.issue-box h3{font-size:16px;margin-bottom:6px}
.issue-box .time{font-size:13px;color:#656d76;margin-bottom:8px}
.issue-box .content{white-space:pre-wrap;line-height:1.5}
.issue-box img{max-width:100%;border-radius:6px;margin:8px 0}
.comment-area{margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h1>📚 作业提交系统</h1>

  <div id="loginPanel">
    <input type="password" id="pwdInput" placeholder="请输入密码">
    <button onclick="login()">登录</button>
  </div>

  <div id="kidPanel" class="hide">
    <h3>✍️ 提交作业</h3>
    <input id="hwTitle" placeholder="作业标题（数学/语文/英语）">
    <textarea id="hwContent" rows="3" placeholder="作业完成情况"></textarea>
    <input type="file" id="hwImage" accept="image/*">
    <button onclick="submitHomework()">提交到 GitHub</button>
    <button class="btn-gray" onclick="logout()">退出</button>
  </div>

  <div id="dadPanel" class="hide">
    <h3>👨 作业检查</h3>
    <div id="issueList">加载中...</div>
    <button class="btn-gray" onclick="logout()">退出</button>
  </div>
</div>

<script>
const CONFIG = {
  username: "yuguo-yg-bit",
  repo:     "homeworkweb",
  token:    "ghp_sVylTqJv8nv"+"K3SK3wS2qidM6AvQAFx1rAvCd"
};

// 登录
function login(){
  const p = document.getElementById("pwdInput").value.trim();
  if(p === "123456"){
    show("kidPanel");
  }else if(p === "dad888"){
    show("dadPanel");
    loadIssues();
  }else{
    alert("密码错误");
  }
}

function show(id){
  document.getElementById("loginPanel").classList.add("hide");
  document.getElementById("kidPanel").classList.add("hide");
  document.getElementById("dadPanel").classList.add("hide");
  document.getElementById(id).classList.remove("hide");
}

function logout(){
  show("loginPanel");
  document.getElementById("pwdInput").value = "";
}

// 提交作业（图片正常显示，不是链接）
async function submitHomework(){
  const title = document.getElementById("hwTitle").value.trim();
  const content = document.getElementById("hwContent").value.trim();
  const file = document.getElementById("hwImage").files[0];

  if(!title) return alert("请输入作业标题");

  let body = content || "无备注";

  if(file){
    alert("图片上传中…");
    const formData = new FormData();
    formData.append("file", file);

    const uploadRes = await fetch("https://api.imgbb.com/1/upload?key=20b0b4e96d6b1f082f04a8871d333774", {
      method: "POST",
      body: formData
    });

    const uploadData = await uploadRes.json();
    if(uploadData.success){
      body += "\n\n![作业图片](" + uploadData.data.url + ")";
    }
  }

  const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues`, {
    method: "POST",
    headers: {
      "Authorization": `token ${CONFIG.token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: `【作业】${title}`,
      body: body
    })
  });

  if(res.ok){
    alert("提交成功！");
    document.getElementById("hwTitle").value = "";
    document.getElementById("hwContent").value = "";
    document.getElementById("hwImage").value = "";
  }else{
    alert("提交失败");
  }
}

// 爸爸查看作业（图片直接显示）
async function loadIssues(){
  const el = document.getElementById("issueList");
  el.innerHTML = "加载中...";

  const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues`, {
    headers: { "Authorization": `token ${CONFIG.token}` }
  });

  const list = await res.json();
  if(!res.ok){ el.innerHTML = "加载失败"; return; }
  if(list.length===0){ el.innerHTML = "<p>暂无作业</p>"; return; }

  let html = "";
  list.forEach(issue => {
    html += `
    <div class="issue-box">
      <h3>${issue.title}</h3>
      <div class="time">${new Date(issue.created_at).toLocaleString()}</div>
      <div class="content">${issue.body}</div>
      <div class="comment-area">
        <textarea rows="2" placeholder="爸爸留言" id="cmt_${issue.number}"></textarea>
        <button class="btn-green" onclick="addComment(${issue.number})">发表评论</button>
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

// 爸爸评论
async function addComment(num){
  const body = document.getElementById(`cmt_${num}`).value.trim();
  if(!body) return alert("请输入留言");

  await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues/${num}/comments`, {
    method: "POST",
    headers: {
      "Authorization": `token ${CONFIG.token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ body })
  });

  alert("评论成功！");
  loadIssues();
}
</script>
</body>
</html>
