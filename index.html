<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作业完成情况</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📚 作业完成情况（爸爸查看）</h1>
    <a href="submit.html" class="btn">去提交作业</a>
    <div id="homework-list">
      <!-- 作业会自动显示在这里 -->
    </div>
  </div>

  <script>
    // 读取本地存储的作业
    function loadHomeworks() {
      let list = document.getElementById('homework-list');
      list.innerHTML = '';
      let homeworks = JSON.parse(localStorage.getItem('homeworks')) || [];
      
      if (homeworks.length === 0) {
        list.innerHTML = '<p>暂无作业</p>';
        return;
      }

      homeworks.forEach((hw, index) => {
        let item = document.createElement('div');
        item.className = 'homework-item';
        item.innerHTML = `
          <h3>${hw.title}</h3>
          <p class="time">${hw.time}</p>
          <p class="note">${hw.note}</p>
        `;
        list.appendChild(item);
      });
    }

    window.onload = loadHomeworks;
  </script>
</body>
</html>
