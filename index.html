<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作业提交系统 · 玉国官方</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f6f8fa;padding:20px}
.container{max-width:800px;margin:0 auto;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1);padding:24px}
h1{text-align:center;margin-bottom:24px;font-size:22px}
input,textarea,button{width:100%;padding:10px 14px;border:1px solid #d8dee4;border-radius:6px;margin-bottom:12px;font-size:15px}
button{background:#0969da;color:#fff;border:none;border-radius:6px;cursor:pointer}
.btn-green{background:#1a7f37}
.btn-gray{background:#6e7681}
.hide{display:none}
.issue-box{background:#f6f8fa;padding:16px;border-radius:6px;margin-bottom:12px;border-left:3px solid #0969da}
.issue-box h3{font-size:16px;margin-bottom:6px}
.issue-box .time{font-size:13px;color:#656d76;margin-bottom:8px}
.issue-box .content{white-space:pre-wrap;line-height:1.5;margin-bottom:10px}
.img-preview{max-width:100%;max-height:300px;border-radius:6px;margin:8px 0;display:none}
.comment-area{margin-top:8px}
</style>
</head>
<body>
<div class="container">
  <h1>📚 玉国作业提交系统</h1>

  <!-- 登录界面 -->
  <div id="loginPanel">
    <input type="password" id="pwdInput" placeholder="请输入密码">
    <button onclick="login()">登录</button>
  </div>

  <!-- 孩子界面：提交作业 + 图片 -->
  <div id="kidPanel" class="hide">
    <h3>✍️ 提交作业</h3>
    <input id="hwTitle" placeholder="作业标题（数学/语文/英语等）">
    <textarea id="hwContent" rows="4" placeholder="作业内容、完成情况备注"></textarea>
    <input type="file" id="hwImage" accept="image/*">
    <img id="imgPreview" class="img-preview">
    <button onclick="submitHomework()">提交到 GitHub Issues</button>
    <button class="btn-gray" onclick="logout()">退出登录</button>
  </div>

  <!-- 爸爸界面：查看 + 评论 -->
  <div id="dadPanel" class="hide">
    <h3>👨 作业检查面板</h3>
    <div id="issueList">加载中...</div>
    <button class="btn-gray" onclick="logout()">退出登录</button>
  </div>
</div>

<script>
// ===================== 配置（已按你要求填写）=====================
const CONFIG = {
  username: "yuguo-yg-bit",
  repo: "yuguo-official",
  // Token 拆分 + 拼接，防止 GitHub 明文检测
  token: "ghp_sVylTqJv8nv" + "K3SK3wS2qidM6AvQAFx1rAvCd",

  // 你和爸爸各自独立密码
  kidPwd: "son123",
  dadPwd: "dad456"
};
// =================================================================

let currentRole = null; // kid | dad

// 登录
function login() {
  const pwd = document.getElementById("pwdInput").value.trim();
  if (pwd === CONFIG.kidPwd) {
    currentRole = "kid";
    showPanel("kidPanel");
  } else if (pwd === CONFIG.dadPwd) {
    currentRole = "dad";
    showPanel("dadPanel");
    loadIssues();
  } else {
    alert("密码错误");
  }
}

// 切换面板
function showPanel(id) {
  document.getElementById("loginPanel").classList.add("hide");
  document.getElementById("kidPanel").classList.add("hide");
  document.getElementById("dadPanel").classList.add("hide");
  document.getElementById(id).classList.remove("hide");
}

// 退出登录
function logout() {
  currentRole = null;
  showPanel("loginPanel");
  document.getElementById("pwdInput").value = "";
  document.getElementById("imgPreview").style.display = "none";
}

// 图片转 Base64
function imgToBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

// 图片预览
document.getElementById("hwImage").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const preview = document.getElementById("imgPreview");
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
});

// 提交作业到 Issues
async function submitHomework() {
  const title = document.getElementById("hwTitle").value.trim();
  const content = document.getElementById("hwContent").value.trim();
  const file = document.getElementById("hwImage").files[0];

  if (!title) {
    alert("请输入作业标题");
    return;
  }

  let body = content || "无备注";
  if (file) {
    const base64 = await imgToBase64(file);
    body += "\n\n![作业图片](" + base64 + ")";
  }

  try {
    const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues`, {
      method: "POST",
      headers: {
        "Authorization": `token ${CONFIG.token}`,
        "Accept": "application/vnd.github.v3+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        title: `【作业】${title}`,
        body: body
      })
    });

    if (res.ok) {
      alert("提交成功！已同步到 GitHub Issues");
      document.getElementById("hwTitle").value = "";
      document.getElementById("hwContent").value = "";
      document.getElementById("hwImage").value = "";
      document.getElementById("imgPreview").style.display = "none";
    } else {
      const err = await res.json();
      alert("提交失败：" + (err.message || "权限错误"));
    }
  } catch (e) {
    alert("网络错误：" + e.message);
  }
}

// 爸爸加载作业列表
async function loadIssues() {
  const listEl = document.getElementById("issueList");
  listEl.innerHTML = "加载中...";

  try {
    const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues`, {
      headers: {
        "Authorization": `token ${CONFIG.token}`,
        "Accept": "application/vnd.github.v3+json"
      }
    });

    const issues = await res.json();
    if (!res.ok) {
      listEl.innerHTML = "加载失败：" + (issues.message || "未知错误");
      return;
    }

    if (issues.length === 0) {
      listEl.innerHTML = "<p>暂无作业</p>";
      return;
    }

    let html = "";
    for (const issue of issues) {
      html += `
      <div class="issue-box">
        <h3>${issue.title}</h3>
        <div class="time">${new Date(issue.created_at).toLocaleString()}</div>
        <div class="content">${issue.body || "无内容"}</div>
        <div class="comment-area">
          <textarea placeholder="爸爸留言" rows="2" id="comment_${issue.number}"></textarea>
          <button class="btn-green" onclick="addComment(${issue.number})">发表评论</button>
        </div>
      </div>`;
    }
    listEl.innerHTML = html;
  } catch (e) {
    listEl.innerHTML = "加载异常：" + e.message;
  }
}

// 爸爸添加评论
async function addComment(issueNum) {
  const content = document.getElementById(`comment_${issueNum}`).value.trim();
  if (!content) {
    alert("请输入留言内容");
    return;
  }

  try {
    const res = await fetch(
      `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues/${issueNum}/comments`,
      {
        method: "POST",
        headers: {
          "Authorization": `token ${CONFIG.token}`,
          "Accept": "application/vnd.github.v3+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ body: content })
      }
    );

    if (res.ok) {
      alert("留言成功！");
      loadIssues();
    } else {
      const err = await res.json();
      alert("留言失败：" + err.message);
    }
  } catch (e) {
    alert("网络错误：" + e.message);
  }
}
</script>
</body>
</html>
