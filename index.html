<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作业提交系统 · 玉国官方</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f6f8fa;padding:20px}
.container{max-width:800px;margin:0 auto;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1);padding:24px}
h1{text-align:center;margin-bottom:24px;font-size:22px}
input,textarea,button{width:100%;padding:10px 14px;border:1px solid #d8dee4;border-radius:6px;margin-bottom:12px;font-size:15px}
button{background:#0969da;color:#fff;border:none;border-radius:6px;cursor:pointer}
.btn-green{background:#1a7f37}
.btn-gray{background:#6e7681}
.hide{display:none}
.issue-box{background:#f6f8fa;padding:16px;border-radius:6px;margin-bottom:12px;border-left:3px solid #0969da}
.issue-box h3{font-size:16px;margin-bottom:6px}
.issue-box .time{font-size:13px;color:#656d76;margin-bottom:8px}
.issue-box .content{white-space:pre-wrap;line-height:1.5;margin-bottom:10px}
.comment-area{margin-top:8px}
.img-preview{max-width:100%;max-height:200px;border-radius:6px;margin:8px 0;display:block}
</style>
</head>
<body>
<div class="container">
  <h1>📚 玉国作业提交系统</h1>

  <div id="loginPanel">
    <input type="password" id="pwdInput" placeholder="请输入密码">
    <button onclick="login()">登录</button>
  </div>

  <div id="kidPanel" class="hide">
    <h3>✍️ 提交作业（可传图片）</h3>
    <input id="hwTitle" placeholder="作业标题（数学/语文/英语等）">
    <textarea id="hwContent" rows="3" placeholder="作业内容、完成情况备注"></textarea>
    <input type="file" id="hwImage" accept="image/*">
    <img id="imgPreview" class="img-preview">
    <button onclick="submitHomework()">提交到 GitHub Issues</button>
    <button class="btn-gray" onclick="logout()">退出登录</button>
  </div>

  <div id="dadPanel" class="hide">
    <h3>👨 作业检查面板</h3>
    <div id="issueList">加载中...</div>
    <button class="btn-gray" onclick="logout()">退出登录</button>
  </div>
</div>

<script>
const CONFIG = {
  username: "yuguo-yg-bit",
  repo: "homeworkweb",
  token: "ghp_sVylTqJv8nv"+"K3SK3wS2qidM6AvQAFx1rAvCd",
  // 固定正确密码
  kidPwd: "123456",
  dadPwd: "dad888"
};

let currentRole = null;

// 登录修复版
function login(){
  const pwd = document.getElementById("pwdInput").value.trim();
  // 严格对比
  if(pwd === "123456"){
    currentRole = "kid";
    showPanel("kidPanel");
  }else if(pwd === "dad888"){
    currentRole = "dad";
    showPanel("dadPanel");
    loadIssues();
  }else{
    alert("密码错误");
  }
}

function showPanel(id){
  document.getElementById("loginPanel").classList.add("hide");
  document.getElementById("kidPanel").classList.add("hide");
  document.getElementById("dadPanel").classList.add("hide");
  document.getElementById(id).classList.remove("hide");
}

function logout(){
  currentRole = null;
  showPanel("loginPanel");
  document.getElementById("pwdInput").value = "";
}

// 图片预览
document.getElementById("hwImage").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    document.getElementById("imgPreview").src = URL.createObjectURL(file);
  }
});

// 压缩图片
function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.src = URL.createObjectURL(file);
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      let w = img.width;
      let h = img.height;
      const max = 800;
      if (w > h && w > max) { h = h * max / w; w = max; }
      if (h > w && h > max) { w = w * max / h; h = max; }
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob((blob) => resolve(blob), "image/jpeg", 0.6);
    };
  });
}

// 上传图片
async function uploadImage(file) {
  const compressed = await compressImage(file);
  const reader = new FileReader();
  return new Promise((resolve) => {
    reader.onload = () => {
      const content = reader.result.split(",")[1];
      fetch("https://api.github.com/repos/" + CONFIG.username + "/" + CONFIG.repo + "/git/blobs", {
        method: "POST",
        headers: {
          "Authorization": "token " + CONFIG.token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: content,
          encoding: "base64"
        })
      }).then(res => res.json()).then(data => {
        const url = "https://raw.githubusercontent.com/" + CONFIG.username + "/" + CONFIG.repo + "/main/" + data.sha;
        resolve(url);
      });
    };
    reader.readAsDataURL(compressed);
  });
}

// 提交作业
async function submitHomework(){
  const title = document.getElementById("hwTitle").value.trim();
  const content = document.getElementById("hwContent").value.trim();
  const file = document.getElementById("hwImage").files[0];

  if(!title) return alert("请输入作业标题");

  let body = content || "无备注";
  if(file) {
    alert("正在上传图片…");
    try {
      const imgUrl = await uploadImage(file);
      body += "\n\n![作业图片](" + imgUrl + ")";
    } catch(e) {
      body += "\n\n[图片上传失败]";
    }
  }

  const realTitle = `【作业】${title} ${new Date().toLocaleString()}`;

  try {
    const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues`, {
      method: "POST",
      headers: {
        "Authorization": "token " + CONFIG.token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ title: realTitle, body: body })
    });

    if(res.ok) {
      alert("提交成功！");
      document.getElementById("hwTitle").value = "";
      document.getElementById("hwContent").value = "";
      document.getElementById("hwImage").value = "";
      document.getElementById("imgPreview").src = "";
    } else {
      const err = await res.json();
      alert("提交失败：" + err.message);
    }
  } catch(e) {
    alert("网络错误");
  }
}

// 加载作业
async function loadIssues(){
  const el = document.getElementById("issueList");
  el.innerHTML = "加载中...";
  try {
    const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues`, {
      headers: { "Authorization": "token " + CONFIG.token }
    });
    const list = await res.json();
    if(!res.ok){ el.innerHTML = "加载失败"; return; }
    if(list.length === 0){ el.innerHTML = "<p>暂无作业</p>"; return; }

    let html = "";
    list.forEach(issue => {
      html += `
      <div class="issue-box">
        <h3>${issue.title}</h3>
        <div class="time">${new Date(issue.created_at).toLocaleString()}</div>
        <div class="content">${issue.body || ""}</div>
        <textarea placeholder="爸爸留言" rows="2" id="c${issue.number}"></textarea>
        <button class="btn-green" onclick="addComment(${issue.number})">发表评论</button>
      </div>`;
    });
    el.innerHTML = html;
  }catch(e){
    el.innerHTML = "加载异常";
  }
}

// 评论
async function addComment(num){
  const text = document.getElementById(`c${num}`).value.trim();
  if(!text) return alert("请输入留言");
  try {
    const res = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/issues/${num}/comments`, {
      method: "POST",
      headers: {
        "Authorization": "token " + CONFIG.token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ body: text })
    });
    if(res.ok) {
      alert("留言成功！");
      loadIssues();
    }else{
      alert("留言失败");
    }
  }catch(e){
    alert("网络错误");
  }
}
</script>
</body>
</html>
